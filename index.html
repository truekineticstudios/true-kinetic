<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım Modu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff4757;
        }
        p {
            font-size: 1.2rem;
            color: #b3b3b3;
        }
        .divider {
            width: 50px;
            height: 2px;
            background-color: #ff4757;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Closed</h1>
        <div class="divider"></div>
        <p>The current workload and the pressure to keep everything running have become quite exhausting lately.<br>Thanks for understanding, and thanks for chosing True Kinetic...</p>
    </div>
</body>
</html>
