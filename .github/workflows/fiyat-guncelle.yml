name: Otomatik Fiyat Güncelleyici

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Fiyat Güncelleme Botunu Çalıştır
        run: python fiyat_botu.py

      - name: Yeni Fiyatları Siteye Kaydet (Commit)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add products.json
          git commit -m "🚀 Fiyatlar otomatik güncellendi" || echo "Değişiklik yok, kaydedilmedi."
          git push
