<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Kinetic | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==========================================================================
           TEMA DEĞİŞKENLERİ VE GENEL STILLER (THEME VARIABLES & RESET)
           ========================================================================== */
        :root {
            --bg-main: #060509;         
            --bg-darker: #030305;       
            --bg-card: #12101a;         
            --purple-glow: #9f7aea;     
            --purple-hover: #b794f4;    
            --text-white: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(159, 122, 234, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            line-height: 1.6;
            display: none; /* Hide body until password is verified */
            padding-bottom: 4rem;
            background-image: radial-gradient(rgba(159, 122, 234, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background-color: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            margin-bottom: 2.5rem;
        }

        .logo-area {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .logo-true { color: var(--text-white); }
        .logo-kinetic { color: var(--purple-glow); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s ease;
        }
        .back-btn:hover {
            color: var(--purple-glow);
            border-color: var(--purple-glow);
        }

        /* Grid Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Card Component */
        .panel-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 2rem;
            height: fit-content;
        }

        .panel-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            color: var(--purple-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .form-control, .form-select {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--text-white);
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--purple-glow);
        }

        .primary-btn {
            background-color: var(--purple-glow);
            color: var(--bg-main);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s ease;
        }
        .primary-btn:hover {
            background-color: var(--purple-hover);
            transform: translateY(-2px);
        }

        /* ANALYTICS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }

        .stat-box {
            background-color: var(--bg-main);
            border: 1px solid rgba(159, 122, 234, 0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 850;
            color: var(--text-white);
        }

        /* Table Toolbar */
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            max-width: 350px;
            width: 100%;
        }

        .search-box input {
            padding-left: 35px;
        }

        .search-box i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .sync-buttons {
            display: flex;
            gap: 10px;
        }

        .sync-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s ease;
        }
        .sync-btn:hover {
            background-color: rgba(159, 122, 234, 0.1);
            border-color: var(--purple-glow);
        }

        /* Orders Table */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
            background-color: var(--bg-card);
            white-space: nowrap;
        }

        .orders-table th, .orders-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .orders-table th {
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--purple-glow);
            font-weight: 700;
        }

        .orders-table tr:hover {
            background-color: rgba(255, 255, 255, 0.01);
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .status-pending { background-color: rgba(241, 196, 15, 0.1); color: #f1c40f; border: 1px solid #f1c40f; }
        .status-completed { background-color: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        .status-cancelled { background-color: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        .order-id {
            font-family: monospace;
            font-weight: 700;
            color: var(--text-muted);
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s ease;
            font-size: 1rem;
        }

        .copy-order-btn { color: #3498db; }
        .copy-order-btn:hover { transform: scale(1.15); color: #2980b9; }

        .delete-order-btn { color: #e74c3c; }
        .delete-order-btn:hover { transform: scale(1.15); color: #c0392b; }

        .status-select-inline {
            background-color: var(--bg-main);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        .status-select-inline:focus {
            border-color: var(--purple-glow);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo-area">
            <span class="logo-true">TRUE</span><span class="logo-kinetic"> COMMAND CENTER</span>
        </div>
        <div class="header-actions">
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Dashboard</a>
        </div>
    </header>

    <!-- Main Board -->
    <div class="container">
        
        <!-- Left Column: Add Order Form -->
        <aside class="panel-card" style="display: flex; flex-direction: column; gap: 20px;">
            
            <!-- Webhook Settings (Hafızada şifreli saklanır, GitHub'da sızmaz!) -->
            <div style="background-color: rgba(159, 122, 234, 0.05); border: 1px dashed var(--purple-glow); padding: 15px; border-radius: 8px;">
                <h4 style="font-size: 0.9rem; color: var(--purple-glow); margin-bottom: 8px;"><i class="fas fa-link"></i> Discord Webhook Integration</h4>
                <div class="form-group" style="margin-bottom: 0;">
                    <input type="password" id="webhookInput" class="form-control" style="font-size: 0.85rem; padding: 8px;" placeholder="Paste Discord Webhook URL here...">
                </div>
            </div>

            <div>
                <h3><i class="fas fa-cart-plus"></i> Add New Order</h3>
                <form id="orderForm">
                    <div class="form-group">
                        <label>Discord Username</label>
                        <input type="text" id="custName" class="form-control" placeholder="e.g., salih_dev" required>
                    </div>

                    <div class="form-group">
                        <label>Purchased Service / Product</label>
                        <input type="text" id="custItem" class="form-control" placeholder="e.g., Valorant 1700 VP" required>
                    </div>

                    <div class="form-group">
                        <label>Amount Paid (e.g. 493 TL or $12)</label>
                        <input type="text" id="custAmount" class="form-control" placeholder="e.g., 493 TL" required>
                    </div>

                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="custPayMethod" class="form-select">
                            <option value="Papara">Papara</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Initial Status</label>
                        <select id="custStatus" class="form-select">
                            <option value="pending">Pending (Hazırlanıyor)</option>
                            <option value="completed">Completed (Teslim Edildi)</option>
                            <option value="cancelled">Cancelled (İptal Edildi)</option>
                        </select>
                    </div>

                    <button type="submit" class="primary-btn" style="width: 100%; justify-content: center; margin-top: 10px;">
                        <i class="fas fa-plus"></i> Save Order
                    </button>
                </form>
            </div>
        </aside>

        <!-- Right Column: Orders Management & Table -->
        <main class="panel-card">
            
            <!-- Quick Analytics Statistics -->
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-label">Total Orders</span>
                    <span id="statTotalOrders" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Pending</span>
                    <span id="statPendingOrders" class="stat-value" style="color: #f1c40f;">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Completed</span>
                    <span id="statCompletedOrders" class="stat-value" style="color: #2ecc71;">0</span>
                </div>
            </div>

            <h3><i class="fas fa-list-check"></i> Orders Management</h3>

            <!-- Search & Sync Toolbar -->
            <div class="table-toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchOrderInput" class="form-control" placeholder="Search customer, item or Order ID...">
                </div>

                <div class="sync-buttons">
                    <input type="file" id="importFile" style="display: none;" accept=".json">
                    <button class="sync-btn" id="importBtn"><i class="fas fa-file-import"></i> Import Backup (Sync)</button>
                    <button class="sync-btn" id="exportBtn"><i class="fas fa-file-export"></i> Export Database</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date & Time</th>
                            <th>Customer</th>
                            <th>Product/Service</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- JS tarafından doldurulacaktır -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const ADMIN_PASSWORD = "xs72kp1z773t3p3t9o5nc2f9uf3rhqx3ylbjexd23mmfty2s5u";

        // 1. ELEMAN TANIMLAMALARI (INITIALIZATIONS FIRST)
        let ordersData = JSON.parse(localStorage.getItem("kineticOrdersDB")) || [];

        const orderForm = document.getElementById("orderForm");
        const ordersTableBody = document.getElementById("tableBody"); // Fix target body ID
        const searchOrderInput = document.getElementById("searchOrderInput");
        const webhookInput = document.getElementById("webhookInput");
        
        const exportBtn = document.getElementById("exportBtn");
        const importBtn = document.getElementById("importBtn");
        const importFile = document.getElementById("importFile");

        // Webhook URL'sini tarayıcı hafızasından oku
        if (webhookInput) {
            webhookInput.value = localStorage.getItem("kineticWebhookURL") || "";
            webhookInput.addEventListener("input", (e) => {
                localStorage.setItem("kineticWebhookURL", e.target.value.trim());
            });
        }

        // 2. DETAYLI İSTATİSTİK METOTLARI
        function updateStats() {
            document.getElementById("statTotalOrders").textContent = ordersData.length;
            
            const pendingCount = ordersData.filter(o => o.status === "pending").length;
            document.getElementById("statPendingOrders").textContent = pendingCount;
            
            const completedCount = ordersData.filter(o => o.status === "completed").length;
            document.getElementById("statCompletedOrders").textContent = completedCount;
        }

        // 3. TABLO ÇİZİM METOTLARI
        function renderOrders(filterText = "") {
            ordersTableBody.innerHTML = "";
            
            const filteredOrders = ordersData.filter(order => {
                const search = filterText.toLowerCase();
                return order.id.toLowerCase().includes(search) || 
                       order.customer.toLowerCase().includes(search) ||
                       order.item.toLowerCase().includes(search);
            });

            const reversedOrders = [...filteredOrders].reverse(); // En yeni sipariş en üstte

            if (reversedOrders.length === 0) {
                ordersTableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding: 25px;">No orders found.</td></tr>`;
                return;
            }

            reversedOrders.forEach(order => {
                const tr = document.createElement("tr");

                tr.innerHTML = `
                    <td class="order-id">#${order.id}</td>
                    <td>${order.date}</td>
                    <td><strong>@${order.customer}</strong></td>
                    <td>${order.item}</td>
                    <td style="color: var(--purple-glow); font-weight: 700;">${order.amount}</td>
                    <td><span class="status-badge" style="color:white; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);">${order.method}</span></td>
                    <td>
                        <select class="status-select-inline" data-id="${order.id}">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-icon-btn copy-order-btn" data-id="${order.id}" title="Copy for Discord Logs">
                                <i class="far fa-copy"></i>
                            </button>
                            <button class="action-icon-btn delete-order-btn" data-id="${order.id}" title="Delete Order">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                ordersTableBody.appendChild(tr);
            });

            // Inline Status Select Değiştirme Tetikleyicileri
            const statusSelects = ordersTableBody.querySelectorAll(".status-select-inline");
            statusSelects.forEach(select => {
                select.addEventListener("change", (e) => {
                    const id = select.getAttribute("data-id");
                    const newStatus = e.target.value;
                    updateOrderStatus(id, newStatus);
                });
            });

            // Sipariş Silme Tetikleyicileri
            const deleteBtns = ordersTableBody.querySelectorAll(".delete-order-btn");
            deleteBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    deleteOrder(id);
                });
            });

            // Discord İçin Kopyalama Tetikleyicileri
            const copyBtns = ordersTableBody.querySelectorAll(".copy-order-btn");
            copyBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = btn.getAttribute("data-id");
                    copyToDiscord(id);
                });
            });
        }

        // 4. VERİTABANI GÜNCELLEME METOTLARI
        function saveOrders() {
            localStorage.setItem("kineticOrdersDB", JSON.stringify(ordersData));
            renderOrders(searchOrderInput.value);
            updateStats();
        }

        // Sipariş Ekleme Formu ve Discord Webhook Gönderimi
        orderForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const customer = document.getElementById("custName").value.trim();
            const item = document.getElementById("custItem").value.trim();
            const amount = document.getElementById("custAmount").value.trim();
            const method = document.getElementById("custPayMethod").value;
            const status = document.getElementById("custStatus").value;

            // Benzersiz 6 haneli kod
            const id = "TK-" + Math.floor(100000 + Math.random() * 900000);

            // Tarih
            const now = new Date();
            const dateStr = now.toLocaleDateString("en-US") + " " + now.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit' });

            const newOrder = { id, date: dateStr, customer, item, amount, method, status };
            ordersData.push(newOrder);
            saveOrders();

            // Discord Webhook Bildirimi Gönder
            sendDiscordNotification(newOrder);

            orderForm.reset();
            alert(`Order #${id} added successfully!`);
        });

        // DISCORD WEBHOOK BİLDİRİM MOTORU
        function sendDiscordNotification(order) {
            const webhookUrl = localStorage.getItem("kineticWebhookURL");
            if (!webhookUrl) return; // Webhook adresi girilmemişse sessizce geç

            const payload = {
                username: "True Kinetic Bot",
                avatar_url: "https://truekinetichub.com.tr/logo.png", // <--- Varsa kendi logonun linkini buraya yazabilirsin
                embeds: [{
                    title: "🆕 New Order Logged!",
                    description: "A new transaction has been registered via Command Center.",
                    color: 10451690, // #9f7aea (Mor Işıma Rengi)
                    fields: [
                        { name: "Order ID", value: `\`#${order.id}\``, inline: true },
                        { name: "Customer", value: `**@${order.customer}**`, inline: true },
                        { name: "Product / Service", value: order.item, inline: false },
                        { name: "Amount Paid", value: `**${order.amount}**`, inline: true },
                        { name: "Payment Method", value: order.method, inline: true },
                        { name: "Order Status", value: `\`${order.status.toUpperCase()}\``, inline: true }
                    ],
                    footer: {
                        text: "True Kinetic Command Center System"
                    },
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(response => {
                if (!response.ok) {
                    console.error("Webhook Error Status:", response.statusText);
                }
            }).catch(err => {
                console.error("Failed to trigger Discord Webhook:", err);
            });
        }

        // Inline Durum Güncelleme
        function updateOrderStatus(id, status) {
            const found = ordersData.find(o => o.id === id);
            if (found) {
                found.status = status;
                saveOrders();
            }
        }

        // Sipariş Silme
        function deleteOrder(id) {
            if (confirm(`Are you sure you want to delete order #${id}?`)) {
                ordersData = ordersData.filter(o => o.id !== id);
                saveOrders();
            }
        }

        // Arama/Filtreleme Olayı
        searchOrderInput.addEventListener("input", (e) => {
            renderOrders(e.target.value);
        });

        // Discord Log Panoya Kopyalama
        function copyToDiscord(id) {
            const order = ordersData.find(o => o.id === id);
            if (!order) return;
            
            const logText = `#${order.id} | Customer: @${order.customer} | Item: ${order.item} | Price: ${order.amount} | Method: ${order.method} | Status: ${order.status.toUpperCase()}`;
            
            navigator.clipboard.writeText(logText).then(() => {
                alert(`Order #${id} info copied to clipboard for Discord!`);
            }).catch(err => {
                console.error("Copy failed: ", err);
            });
        }

        // ==========================================================================
        // 5. YETKİLENDİRME VE GÜVENLİK KONTROLÜ (GÜVENLİ EN SONDA ÇALIŞTIRMA)
        // ==========================================================================
        function verifyAccess() {
            const inputPass = prompt("Please enter the Admin Password:");
            
            if (inputPass === null) {
                window.location.href = "../index.html";
                return;
            }

            if (inputPass === ADMIN_PASSWORD) {
                document.body.style.display = "block"; // Paneli aç
                renderOrders();
                updateStats();
            } else {
                alert("Incorrect password! Access denied.");
                window.location.href = "../index.html";
            }
        }

        // Doğrulamayı başlat
        verifyAccess();

        // ==========================================================================
        // EXPORT & IMPORT ENGINE
        // ==========================================================================
        exportBtn.addEventListener("click", () => {
            if (ordersData.length === 0) {
                alert("No orders available to back up!");
                return;
            }
            
            const exportData = {
                source: "True Kinetic Command Center Backup",
                date: new Date().toLocaleDateString("en-US"),
                orders: ordersData
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
            const downloadLink = document.createElement('a');
            downloadLink.setAttribute("href", dataStr);
            downloadLink.setAttribute("download", `tk_orders_db_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadLink);
            downloadLink.click();
            downloadLink.remove();
        });

        importBtn.addEventListener("click", () => {
            importFile.click();
        });

        importFile.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const backup = JSON.parse(event.target.result);
                    if (backup && backup.orders) {
                        if (confirm(`Warning: Your current lists will be overwritten by ${backup.orders.length} orders from this file. Do you wish to continue?`)) {
                            ordersData = backup.orders;
                            saveOrders();
                            alert("Database synced and restored successfully!");
                        }
                    } else {
                        alert("Invalid backup file! Target JSON must contain 'orders' key.");
                    }
                } catch (err) {
                    alert("Error reading backup file. Please select a valid JSON database file.");
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
